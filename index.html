<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tía Petrona</title>

<meta name="theme-color" content="#980000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tía Petrona">

<link rel="apple-touch-icon" href="icons/icon-192.png">

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

#splash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#8b0000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

.splash-logo{
width:220px;
margin-bottom:30px;
}

.loader{
width:220px;
height:10px;
background:rgba(255,255,255,.2);
border-radius:20px;
overflow:hidden;
}

.loader-fill{
height:100%;
width:0%;
background:#f2c230;
animation:loading 2s linear forwards;
}

@keyframes loading{

0%{
width:0%;
}

100%{
width:100%;
}

}  

body{
margin:0;
font-family:Arial,sans-serif;
background:#7A0000;
color:white;
display:flex;
justify-content:center;
}

.hero{
width:100%;
max-width:500px;
padding:20px;
text-align:center;
}

.logo{
width:180px;
display:block;
margin:10px auto 20px auto;
}

.estado{
font-size:22px;
font-weight:bold;
margin-bottom:25px;
}

.promo{
background:#f2c230;
color:#111;
border-radius:20px;
padding:20px;
margin-bottom:25px;
box-shadow:0 6px 20px rgba(0,0,0,.25);
text-decoration:none;
display:block;
}

.promo-nombre{
font-size:28px;
font-weight:bold;
}

.promo-precio{
font-size:72px;
font-weight:900;
line-height:1;
margin-top:10px;
}

.btn{
display:block;
width:100%;
box-sizing:border-box;
padding:18px;
margin:12px 0;
border-radius:18px;
text-decoration:none;
font-weight:bold;
font-size:24px;
color:white;
}

.btn-pedido{
background:#c50000;
}

.btn-whatsapp{
background:#25D366;
}

.btn-mapa{
background:#222;
}

.social{
display:flex;
justify-content:center;
gap:20px;
margin-top:20px;
}

.social a{
width:70px;
height:70px;
border-radius:15px;
background:#111;
display:flex;
align-items:center;
justify-content:center;
text-decoration:none;
color:white;
font-size:34px;
transition:0.2s;
}

.social a:hover{
transform:scale(1.05);
}

.footer{
margin-top:25px;
font-size:18px;
color:#f2f2f2;
}

</style>

</head>
<body>
<div id="splash">

  <img src="icons/logo.png" class="splash-logo">

  <div class="loader">
    <div class="loader-fill"></div>
  </div>

</div>

<section class="hero">

<img src="icons/logo.png" class="logo">

<div id="estado-local" class="estado">
Cargando...
</div>

<a class="promo" href="https://menu.fu.do/tia.petrona">

<div class="promo-nombre">
🔥 MINI LOMO
</div>

<div class="promo-precio">
$8.499
</div>

</a>

<a class="btn btn-pedido" href="https://menu.fu.do/tia.petrona">
<i class="fa-solid fa-cart-shopping"></i>
HACER MI PEDIDO
</a>

<a class="btn btn-whatsapp" 
  href="https://wa.me/5493865632018?text=Hola%20%F0%9F%91%8B%0A%0AVengo%20desde%20la%20App%20de%20T%C3%ADa%20Petrona.%0A%0AQuisiera%20m%C3%A1s%20informaci%C3%B3n%20para%20hacer%20un%20pedido.">
<i class="fa-brands fa-whatsapp"></i>
WHATSAPP
</a>

<a class="btn btn-mapa" href="https://maps.google.com/?q=Tia+Petrona+French+579+Aguilares+Tucuman">
<i class="fa-solid fa-location-dot"></i>
CÓMO LLEGAR
</a>

<button id="installBtn" class="btn btn-mapa" style="display:none;">
📲 INSTALAR APP
</button> 

<div class="social">

<a href="https://instagram.com/tiapetrona" target="_blank">
<i class="fa-brands fa-instagram"></i>
</a>

<a href="https://tiktok.com/@tiapetrona" target="_blank">
<i class="fa-brands fa-tiktok"></i>
</a>

</div>

<div class="footer">
French 579 · Aguilares · Tucumán
</div>

</section>

<script>

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js");
}

const ahora = new Date();
const hora = ahora.getHours();

const estado = document.getElementById("estado-local");

if (hora >= 20 || hora < 2) {
  estado.innerHTML = "🟢 ABIERTO";
  estado.style.color = "#8CFF5A";
} else {
  estado.innerHTML = "🔴 CERRADO · Abrimos 20:00";
  estado.style.color = "#FFD0D0";
}

let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e) => {

  e.preventDefault();

  deferredPrompt = e;

  const installBtn = document.getElementById("installBtn");

  installBtn.style.display = "block";

});

document.getElementById("installBtn").addEventListener("click", async () => {

  const isiPhone =
    /iPhone|iPad|iPod/i.test(navigator.userAgent);

  if (isiPhone) {

    alert(
      "Para instalar la App:\n\n1. Tocá Compartir\n2. Agregar a pantalla de inicio"
    );

    return;
  }

  if (!deferredPrompt) return;

  deferredPrompt.prompt();

  await deferredPrompt.userChoice;

  deferredPrompt = null;

});

// SPLASH SCREEN

window.addEventListener("load", () => {

  setTimeout(() => {

    document.getElementById("splash").style.display = "none";

  }, 2000);

});

</script>
</body>
</html>
