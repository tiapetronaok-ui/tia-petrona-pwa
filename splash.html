<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tía Petrona</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#650000;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial,sans-serif;
overflow:hidden;
}

.container{
text-align:center;
width:90%;
max-width:400px;
}

.logo{
width:220px;
display:block;
margin:auto;
}

.loading-container{
margin-top:35px;
width:100%;
height:12px;
background:rgba(255,255,255,.15);
border-radius:999px;
overflow:hidden;
}

.loading-bar{
height:100%;
width:0%;
background:#f2c230;
border-radius:999px;
animation:loading 2s linear forwards;
}

.loading-text{
margin-top:12px;
color:white;
font-size:14px;
letter-spacing:2px;
}

@keyframes loading{

0%{
width:0%;
}

100%{
width:100%;
}

}

</style>

</head>

<body>

<div class="container">

<img src="icons/logo.png" class="logo">

<div class="loading-container">
<div class="loading-bar"></div>
</div>

<div class="loading-text">
CARGANDO...
</div>

</div>

<script>

setTimeout(function(){

window.location.href = "index.html";

},2000);

</script>

</body>
</html>
